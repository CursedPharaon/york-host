<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>York Hosting</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0f0a;font-family:'Courier New',monospace;color:#eee;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .container{max-width:700px;width:100%;background:#121a12;border:2px solid #2a4a2a;border-radius:16px;padding:24px 20px}
        .logo{font-size:32px;font-weight:bold;color:#3a8a3a;letter-spacing:2px;border-bottom:1px solid #1a2a1a;padding-bottom:14px}
        .logo span{color:#5a9a5a}
        .form-group{margin:12px 0}
        .form-group label{display:block;color:#6a8a6a;font-size:14px;margin-bottom:4px}
        .form-group input,.form-group select{width:100%;padding:10px;background:#0a0f0a;border:1px solid #1a2a1a;color:#eee;border-radius:8px;font-family:inherit;font-size:16px}
        .form-group input:focus,.form-group select:focus{border-color:#2a4a2a;outline:none}
        .btn-primary{background:#2a4a2a;border:1px solid #3a5a3a;color:#eee;padding:12px 24px;border-radius:8px;font-family:inherit;font-weight:bold;cursor:pointer;transition:0.2s;width:100%;font-size:16px}
        .btn-primary:hover{background:#3a6a3a}
        .server-item{background:#0f1a0f;border:1px solid #1a2a1a;border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .server-item .name{font-size:16px;font-weight:bold;color:#8a8}
        .server-item .status{font-size:13px;padding:2px 12px;border-radius:20px}
        .server-item .status.online{background:#1a3a1a;color:#4a4}
        .server-item .status.offline{background:#2a1a1a;color:#a44}
        .server-item .actions{display:flex;gap:6px;flex-wrap:wrap}
        .server-item .actions button{background:#1a2a1a;border:1px solid #2a3a2a;color:#aaa;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px}
        .server-item .actions button:hover{border-color:#3a5a3a;color:#eee}
        .server-item .actions button.danger:hover{border-color:#5a2a2a;color:#c44}
        .hidden{display:none !important}
        .error{color:#c44;margin-top:8px;font-size:14px;white-space:pre-line}
        .success{color:#4a4;margin-top:8px;font-size:14px;white-space:pre-line}
        .empty{color:#4a6a4a;padding:20px 0;text-align:center}
        .info{font-size:12px;color:#4a6a4a;margin-top:6px}
        .copy-btn{background:#1a2a1a;border:1px solid #2a3a2a;color:#6a8a6a;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px}
        .copy-btn:hover{border-color:#3a5a3a;color:#aaa}
        @media(max-width:600px){.container{padding:14px}.logo{font-size:24px}}
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="logo">Y<span>O</span>RK <span style="font-size:14px;color:#4a6a4a;">hosting</span></div>
    
    <div style="margin:16px 0;">
        <div class="form-group">
            <label>🌐 Название сервера</label>
            <input id="serverName" placeholder="Например: York PvP">
        </div>
        <div class="form-group">
            <label>👤 Ваш ник в игре (администратор)</label>
            <input id="adminNick" placeholder="Ваш ник" value="cursed_pharaon">
        </div>
        <div class="form-group">
            <label>📐 Размер карты</label>
            <select id="mapSize">
                <option value="40">40x40 (бесплатно)</option>
                <option value="150" selected>150x150 (стандарт)</option>
                <option value="200">200x200 (премиум)</option>
            </select>
        </div>
        <div class="form-group">
            <label>🔄 Вайп (дни)</label>
            <select id="wipeDays">
                <option value="7">7 дней</option>
                <option value="14">14 дней</option>
                <option value="30" selected>30 дней</option>
                <option value="0">Без вайпа</option>
            </select>
        </div>
        <button class="btn-primary" onclick="createServer()">🚀 Создать сервер</button>
        <div id="message" class="error"></div>
    </div>

    <hr style="border-color:#1a2a1a;margin:16px 0;">

    <h3 style="color:#8a8;font-size:18px;">📡 Список серверов</h3>
    <div id="serverList">
        <div class="empty">Загрузка...</div>
    </div>
</div>

<script>
    // ========== ПРЯМОЕ ПОДКЛЮЧЕНИЕ К TURSO ==========
    const TURSO_URL = "https://york-cursedd.aws-eu-west-1.turso.io/v1/execute";
    const TURSO_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODQzMTk3MjksImlkIjoiMDE5ZjZmNzgtZGEwMS03ZmMwLThjNzgtOWUwNTIxYzdjMGIyIiwia2lkIjoicWpYbEhLbElGQmJNX29uRDlaWEkyWFVfazVBT3h3X3JIMF9TcUZ6MmU0ZyIsInJpZCI6ImRhMmVhODNiLTM0NTYtNDYwNy1iMmJiLTFmNWY1NWM0MDFhMiJ9.iUoQ29p0S3GtFyFwYhz925NtgbelgmJAdMkFXqC_Yap_r2P7K35YZiTqSQ-iPRW_Tpw5hiU03q7ZbVmqRxxZDg";

    async function tursoQuery(sql, params = []) {
        try {
            const resp = await fetch(TURSO_URL, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + TURSO_TOKEN,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ sql, args: params })
            });
            const data = await resp.json();
            return data.result || { rows: [] };
        } catch (e) {
            console.error('Turso ошибка:', e);
            return { rows: [] };
        }
    }

    // ========== СОЗДАНИЕ СЕРВЕРА (с получением ID) ==========
    async function createServer() {
        const name = document.getElementById('serverName').value.trim();
        const admin = document.getElementById('adminNick').value.trim();
        const size = parseInt(document.getElementById('mapSize').value);
        const wipe = parseInt(document.getElementById('wipeDays').value);
        
        const msg = document.getElementById('message');
        msg.textContent = '';
        msg.className = 'error';
        
        if (!name || !admin) {
            msg.textContent = '❌ Заполните название и ник администратора';
            return;
        }
        
        try {
            // Вставляем сервер
            await tursoQuery(
                "INSERT INTO servers (name, admin, size, wipe_days, tariff) VALUES (?, ?, ?, ?, ?)",
                [name, admin, size, wipe, size >= 200 ? 'premium' : size >= 150 ? 'standard' : 'free']
            );
            
            // Получаем последний ID
            const idResult = await tursoQuery("SELECT last_insert_rowid()");
            const newId = idResult.rows?.[0]?.[0] || 'не удалось получить ID';
            
            msg.className = 'success';
            msg.textContent = `✅ Сервер «${name}» создан! ID: ${newId}`;
            
            document.getElementById('serverName').value = '';
            await loadServers();
            
            const link = `https://york-game.onrender.com/play?server=${newId}`;
            msg.textContent += `\n🔗 Ссылка: ${link}`;
            
        } catch (e) {
            msg.textContent = `❌ Ошибка: ${e.message || 'неизвестная'}`;
            console.error(e);
        }
    }

    // ========== ЗАГРУЗКА СПИСКА СЕРВЕРОВ ==========
    async function loadServers() {
        const list = document.getElementById('serverList');
        list.innerHTML = '<div class="empty">⏳ Загрузка...</div>';
        try {
            const result = await tursoQuery("SELECT id, name, admin, size, wipe_days, tariff FROM servers ORDER BY id DESC");
            if (!result.rows || result.rows.length === 0) {
                list.innerHTML = '<div class="empty">📭 Серверов пока нет</div>';
                return;
            }
            list.innerHTML = result.rows.map(row => {
                const id = row[0];
                const name = row[1];
                const admin = row[2];
                const size = row[3];
                const wipe = row[4];
                const tariff = row[5] || 'free';
                const link = `https://york-game.onrender.com/play?server=${id}`;
                return `
                    <div class="server-item">
                        <div>
                            <div class="name">🌐 ${name}</div>
                            <div style="font-size:12px;color:#6a8a6a;">admin: ${admin} · ${size}x${size} · вайп ${wipe}д · ${tariff}</div>
                            <div style="font-size:11px;color:#4a6a4a;margin-top:2px;">
                                🔗 ${link}
                                <button class="copy-btn" onclick="copyLink('${link}')">📋 Копировать</button>
                            </div>
                        </div>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <span class="status online">● онлайн</span>
                            <button onclick="deleteServer(${id})" class="danger" style="background:#1a2a1a;border:1px solid #2a3a2a;color:#aaa;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            list.innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            console.error(e);
        }
    }

    // ========== УДАЛЕНИЕ СЕРВЕРА ==========
    async function deleteServer(id) {
        if (!confirm(`Удалить сервер #${id}?`)) return;
        try {
            await tursoQuery("DELETE FROM servers WHERE id = ?", [id]);
            await loadServers();
        } catch (e) {
            alert('Ошибка удаления: ' + e.message);
        }
    }

    // ========== КОПИРОВАНИЕ ССЫЛКИ ==========
    function copyLink(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Ссылка скопирована:\n' + text);
        }).catch(() => {
            prompt('Скопируйте ссылку вручную:', text);
        });
    }

    // ========== ЗАПУСК ==========
    loadServers();
    console.log('🏗️ York Hosting (без регистрации) загружен!');
</script>
</body>
</html>
